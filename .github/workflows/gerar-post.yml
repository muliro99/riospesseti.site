name: Gerar Post do Blog

on:
  schedule:
    # Segunda, quarta e sexta as 10h (Brasilia = 13h UTC)
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:

jobs:
  gerar-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar git
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@riosepessetti.adv.br"

      - name: Gerar artigo e publicar
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/gerar-post.js
